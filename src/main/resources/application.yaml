spring:

  application:
    name: wigell_mc_rental

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    defer-datasource-initialization: true

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:6606/wigell_mc_db?createDatabaseIfNotExist=true
    username: root
    password: root

  security:
    user:
      name: user
      password: user
  sql:
    init:
      mode: always

server:
  port: 8585

logging:
  level:
    root: INFO
    com.sjoqvist.wigell_mc_rental: DEBUG