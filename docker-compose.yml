services:
  mysql:
    image: mysql:8.0
    container_name: wigell-mc-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wigell_mc_db
      MYSQL_PASSWORD: password
    ports:
      - "6606:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: #